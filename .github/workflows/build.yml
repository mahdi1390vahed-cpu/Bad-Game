name: Build APK

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: kivy/buildozer

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Disable root warning
        run: |
          sed -i 's/warn_on_root = 1/warn_on_root = 0/g' buildozer.spec || true

      - name: Build APK
        run: |
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
